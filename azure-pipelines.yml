trigger:
  branches:
    include:
      - main
      - updates

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: kzn-skills-audit-portal

stages:

# =========================
# BUILD FRONTEND ✅
# =========================
  - stage: Build
    displayName: Build frontend
    jobs:
      - job: BuildFrontend
        displayName: Install and build
        steps:
          - checkout: self

          - task: UseNode@1
            inputs:
              version: '18.x'

          - script: |
              npm cache clean --force
              npm install --legacy-peer-deps
            displayName: Install dependencies

          - script: npm run build
            displayName: Build production bundle

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: dist
              artifact: frontend-dist


# =========================
# DEPLOY FRONTEND ✅ (FIXED)
# =========================
  - stage: DeployFrontend
    displayName: Deploy frontend
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployStaticWebApp
        displayName: Deploy to Azure Static Web Apps
        steps:

          - download: current
            artifact: frontend-dist

          # ✅ IMPORTANT: flatten dist contents (fixes 404 assets)
          - script: |
              mkdir app
              cp -r $(Pipeline.Workspace)/frontend-dist/* app/
            displayName: Prepare deployment folder

          - task: AzureStaticWebApp@0
            inputs:
              app_location: 'app'      # ✅ DEPLOY CONTENTS, NOT dist folder
              output_location: ''      # ✅ no rebuild
              skip_app_build: true
              azure_static_web_apps_api_token: '$(AZURE_STATIC_WEB_APPS_API_TOKEN)'


# =========================
# DEPLOY POWER PLATFORM ✅
# =========================
  - stage: DeployPowerPlatform
    displayName: Deploy Power Platform assets
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployDataverse
        displayName: Provision Dataverse schema and relationships
        steps:
          - checkout: self

          - task: PowerShell@2
            inputs:
              targetType: inline
              script: |
                pwsh ./scripts/deploy-dataverse-schema.ps1 `
                  -TenantId '$(TenantId)' `
                  -ClientId '$(ClientId)' `
                  -ClientSecret '$(ClientSecret)' `
                  -DataverseUrl '$(DataverseUrl)'

                pwsh ./scripts/deploy-dataverse-relationships.ps1 `
                  -TenantId '$(TenantId)' `
                  -ClientId '$(ClientId)' `
                  -ClientSecret '$(ClientSecret)' `
                  -DataverseUrl '$(DataverseUrl)'

                pwsh ./scripts/deploy-dataverse-keys-and-choices.ps1 `
                  -TenantId '$(TenantId)' `
                  -ClientId '$(ClientId)' `
                  -ClientSecret '$(ClientSecret)' `
                  -DataverseUrl '$(DataverseUrl)'
              pwsh: true