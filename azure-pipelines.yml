trigger:
  branches:
    include:
      - main
      - updates

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  - group: kzn-skills-audit-portal

stages:

# =========================
# BUILD FRONTEND ✅
# =========================
  - stage: Build
    displayName: Build frontend
    jobs:
      - job: BuildFrontend
        steps:
          - checkout: self

          - task: UseNode@1
            inputs:
              version: '18.x'

          - script: |
              npm install --legacy-peer-deps
            displayName: Install dependencies

          - script: npm run build
            displayName: Build app

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: dist
              artifact: frontend-dist


# =========================
# DEPLOY FRONTEND ✅
# =========================
  - stage: DeployFrontend
    dependsOn: Build
    jobs:
      - job: DeployStaticWebApp
        steps:
          - download: current
            artifact: frontend-dist

          - script: |
              mkdir app
              cp -r $(Pipeline.Workspace)/frontend-dist/* app/
            displayName: Prepare app

          - task: AzureStaticWebApp@0
            inputs:
              app_location: 'app'
              output_location: ''
              skip_app_build: true
              azure_static_web_apps_api_token: '$(AZURE_STATIC_WEB_APPS_API_TOKEN)'


# =========================
# POWER PLATFORM ✅
# =========================
  - stage: DeployPowerPlatform
    dependsOn: Build
    jobs:
      - job: DeployDataverse
        steps:
          - checkout: self

          - task: PowerShell@2
            inputs:
              targetType: inline
              script: |
                pwsh ./scripts/deploy-dataverse-schema.ps1 `
                  -TenantId '$(TenantId)' `
                  -ClientId '$(ClientId)' `
                  -ClientSecret '$(ClientSecret)' `
                  -DataverseUrl '$(DataverseUrl)'